name: Deploy Odoo Professional Architecture

on:
  push:
    branches: [ main, develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Asegurar que el directorio base exista, si no, clonar dinámicamente
            if [ ! -d "~/proyecto-odoo" ]; then
              echo "📦 Servidor nuevo detectado. Clonando repositorio por primera vez..."
              git clone https://github.com/${{ github.repository }}.git ~/proyecto-odoo
            fi

            cd ~/proyecto-odoo
            
            echo "🧹 Borrando cualquier cambio local en el servidor..."
            git reset --hard HEAD
            git clean -fd
            git fetch origin

            # 🛠️ DETECCIÓN DE RAMA DESDE GITHUB ACTIONS
            # Usamos la variable directa de GitHub para saber a qué rama se hizo el push
            TARGET_BRANCH="${{ github.ref_name }}"
            echo "La rama detectada en el push es: $TARGET_BRANCH"

            if [ "$TARGET_BRANCH" = "main" ]; then
              echo "🚀 DESPLEGANDO EN PRODUCCIÓN (JUGUETERÍA ALMEY)"
              git checkout main
              git pull origin main
              cd environments/jugueteria/prod
              
              echo "🧠 Calculando hardware de producción y levantando..."
              chmod +x up.sh
              ./up.sh
              docker compose up -d --force-recreate --remove-orphans

            elif [ "$TARGET_BRANCH" = "develop" ]; then
              echo "🧪 DESPLEGANDO EN STAGING"
              git checkout develop
              git pull origin develop
              cd environments/jugueteria/staging
              
              echo "🧪 Calculando hardware de staging y levantando..."
              chmod +x up_staging.sh
              ./up_staging.sh
              docker compose up -d --force-recreate --remove-orphans
            else
              echo "⚠️ Rama no configurada para despliegue automático automático."
              exit 1
            fi

            # 3. Mantenimiento del Servidor
            echo "🧹 Ejecutando limpieza de sistema..."
            docker system prune -f
            sudo journalctl --vacuum-time=1d
            
            echo "✅ ¡Proceso completamente automatizado con éxito!"