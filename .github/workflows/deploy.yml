name: Deploy Odoo Professional Architecture

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # 1. Actualizar el repositorio de código
            cd ~/proyecto-odoo
            git pull origin main

            # 2. Actualizar Entorno de PRODUCCIÓN
            echo "Desplegando en Producción..."
            cd ~/proyecto-odoo/environments/jugueteria/prod
            docker compose up -d --remove-orphans

            # 3. Actualizar Entorno de STAGING (Pruebas)
            echo "Desplegando en Staging..."
            cd ~/proyecto-odoo/environments/jugueteria/staging
            docker compose up -d --remove-orphans

            # 4. Limpieza de mantenimiento (Para cuidar tus 20GB de disco)
            echo "Iniciando limpieza de mantenimiento..."
            docker system prune -f
            sudo journalctl --vacuum-time=1d