name: Deploy Odoo Professional Architecture

on:
  push:
    branches: [ main, develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to AWS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # 1. Preparación y Git
            cd ~/proyecto-odoo
            git fetch origin
            
            if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
              echo "🚀 DESPLEGANDO EN PRODUCCIÓN"
              git checkout main
              git pull origin main
              cd environments/jugueteria/prod
            elif [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
              echo "🧪 DESPLEGANDO EN STAGING"
              git checkout develop
              git pull origin develop
              cd environments/jugueteria/staging
            fi

            # 2. Ejecución de Docker
            echo "📦 Actualizando contenedores y forzando reinicio para actualizar módulos..."
            # Usamos --force-recreate para asegurar que el comando 'odoo -u base' se ejecute
            docker compose up -d --force-recreate --remove-orphans
            
            # 3. Mantenimiento
            echo "🧹 Ejecutando limpieza de sistema..."
            docker system prune -f
            sudo journalctl --vacuum-time=1d
            
            echo "✅ ¡Proceso completado!"