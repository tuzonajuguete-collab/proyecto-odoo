name: Deploy Odoo Professional Architecture

on:
  push:
    branches: [ main, develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # =======================================================================
      # 🚀 BLOQUE 1: DESPLEGANDO EN VM DE PRODUCCIÓN (Únicamente rama main)
      # =======================================================================
      - name: Deploy to Production VM via SSH
        if: github.ref_name == 'main'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST_PROD }}      # 🔑 Tu IP de producción actual
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY_PROD }}    # 🔑 Contenido de cli-jug-almey-prod.pem
          script: |
            # 1. Validar si la carpeta existe. Si no, clonar el repositorio limpio de inmediato
            if [ ! -d "/home/ubuntu/proyecto-odoo" ]; then
              echo "📦 Servidor nuevo detectado. Clonando repositorio por primera vez desde GitHub..."
              git clone https://github.com/${{ github.repository }}.git /home/ubuntu/proyecto-odoo
            fi

            # 🛠️ PASO CRÍTICO: Entrar al repositorio ANTES de cualquier comando Git
            cd /home/ubuntu/proyecto-odoo || exit 1
            
            echo "🧹 Limpiando cualquier cambio local residual dentro del repositorio..."
            git reset --hard HEAD
            git clean -fd
            
            echo "🔄 Sincronizando el árbol de ramas con el origen de GitHub..."
            git fetch origin

            TARGET_BRANCH="${{ github.ref_name }}"
            echo "La rama detectada en el push de GitHub es: $TARGET_BRANCH"

            echo "🚀 Cambiando a la rama main y actualizando código..."
            git checkout main
            git pull origin main
            
            # 📂 Moverse a la subcarpeta real de producción donde está tu up.sh
            echo "📂 Cambiando al directorio de producción..."
            cd environments/jugueteria/prod/ || exit 1
            
            # 🧠 Ejecutar tu script inteligente de hardware antes del docker compose
            echo "🧠 Calculando hardware de producción y levantando..."
            chmod +x up.sh
            ./up.sh
            docker compose up -d --force-recreate --remove-orphans

            # 3. Mantenimiento rutinario de la VM
            echo "🧹 Ejecutando limpieza preventiva de imágenes y volúmenes Docker colgados..."
            docker system prune -f
            
            echo "🪵 Compactando registros del sistema operativo para liberar espacio en AWS..."
            sudo journalctl --vacuum-time=1d
            
            echo "✅ ¡Proceso de Producción completamente automatizado con éxito!"

      # =======================================================================
      # 🧪 BLOQUE 2: DESPLEGANDO EN VM DE PRUEBAS (Únicamente rama develop)
      # =======================================================================
      - name: Deploy to Staging VM via SSH
        if: github.ref_name == 'develop'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST_STAGE || '1.1.1.1' }}        # 🔑 Si no existe el secret, usa IP falsa temporal
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY_STAGE || 'temporal' }}    # 🔑 Si no existe el secret, usa texto temporal
          script: |
            # 1. Validar si la carpeta existe. Si no, clonar el repositorio limpio de inmediato
            if [ ! -d "/home/ubuntu/proyecto-odoo" ]; then
              echo "📦 Servidor de Pruebas nuevo detectado. Clonando repositorio por primera vez..."
              git clone https://github.com/${{ github.repository }}.git /home/ubuntu/proyecto-odoo
            fi

            # 🛠️ PASO CRÍTICO: Entrar al repositorio ANTES de cualquier comando Git
            cd /home/ubuntu/proyecto-odoo || exit 1
            
            echo "🧹 Limpiando cualquier cambio local residual dentro del repositorio..."
            git reset --hard HEAD
            git clean -fd
            
            echo "🔄 Sincronizando metadatos desde GitHub..."
            git fetch origin

            TARGET_BRANCH="${{ github.ref_name }}"
            echo "La rama detectada en el push de GitHub es: $TARGET_BRANCH"

            echo "🧪 Cambiando a la rama develop y actualizando código..."
            git checkout develop
            git pull origin develop
            
            # 📂 Moverse a la subcarpeta real de staging donde está tu up_staging.sh
            echo "📂 Cambiando al directorio de staging..."
            cd environments/jugueteria/staging/ || exit 1
            
            # 🧪 Ejecutar tu script inteligente de hardware para staging antes del docker compose
            echo "🧪 Calculando hardware de staging y levantando..."
            chmod +x up_staging.sh
            ./up_staging.sh
            docker compose up -d --force-recreate --remove-orphans

            # 3. Mantenimiento del Servidor de Pruebas
            echo "🧹 Ejecutando limpieza de sistema en la VM de Pruebas..."
            docker system prune -f
            sudo journalctl --vacuum-time=1d
            
            echo "✅ ¡Entorno de Pruebas actualizado con éxito!"